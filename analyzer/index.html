<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>중고 매물, 이거 사도 돼요?</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon32.png" />
    <link rel="apple-touch-icon" href="/icons/icon128.png" />
    <link rel="stylesheet" href="style.css?v=20260521-1844-scroll-stage-gates" />
  </head>
  <body>
    <div id="aiGate" class="ai-gate" role="dialog" aria-modal="true" aria-labelledby="aiGateTitle">
      <div class="ai-gate__panel">
        <h2 id="aiGateTitle" class="ai-gate__title">Gemini API 설정</h2>
          <p class="ai-gate__desc">
          유사 매물 검색어 정규화 등 AI 기능을 쓰려면
          <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a>
          에서 발급한 API 키를 입력하세요. 키는 이 브라우저에만 저장됩니다.
          <strong>저장할 때마다 서버가 Google API로 연결을 테스트합니다.</strong>
        </p>
        <form id="aiGateForm" class="ai-gate__form">
          <label class="ai-gate__label" for="aiApiKey">API 키</label>
          <input
            id="aiApiKey"
            name="apiKey"
            type="password"
            autocomplete="off"
            class="ai-gate__input"
            placeholder="여기에 API 키 붙여넣기"
            required
          />
          <label class="ai-gate__label" for="aiModel">Gemini 모델</label>
          <select id="aiModel" name="model" class="ai-gate__select"></select>
          <p id="aiGateError" class="ai-gate__error" role="alert"></p>
          <button type="submit" class="btn ai-gate__submit">저장하고 시작</button>
        </form>
      </div>
    </div>

    <div id="appShell" class="app-shell app-shell--locked app-shell--slide" inert>
      <header class="top">
        <div class="brand">
          <img class="brand-icon" src="/icons/icon48.png" alt="" width="32" height="32" />
          <div>
          <h1>중고 매물, 이거 사도 돼요?</h1>
          <p class="sub">시세·하자·네고까지 구매 판단을 도와줍니다.</p>
          </div>
        </div>
        <div class="top-actions">
          <button type="button" id="btnLayoutMode" class="btn btn-secondary btn-small mode-toggle" aria-pressed="true">스크롤식</button>
          <button type="button" id="btnHistory" class="btn btn-secondary btn-small">최근 매물</button>
          <button type="button" id="btnDirectAi" class="btn btn-secondary btn-small">AI 대화</button>
          <button type="button" id="btnAiSettings" class="btn btn-secondary btn-small">AI 설정</button>
          <button type="button" id="btnRefresh" class="btn">불러오기</button>
        </div>
      </header>

      <section id="directAiPanel" class="direct-chat-popover" hidden aria-hidden="true"></section>

    <main class="analysis-board" id="analysisBoard">
      <section class="listing-cluster" id="current">
        <article class="mini-card mini-card--empty">
          <img class="empty-extension-icon" src="/icons/icon128.png" alt="" width="72" height="72" />
          <h2>매물 대기</h2>
          <p class="empty">매물 페이지 우측 하단에 뜨는 이 확장 아이콘을 눌러 분석 웹으로 보내세요.</p>
        </article>
      </section>
    </main>

    <aside class="recent-drawer" id="recentDrawer" aria-hidden="true">
      <div class="recent-drawer__head">
        <h2>최근 매물</h2>
        <button type="button" id="btnHistoryClear" class="drawer-clear">전체 삭제</button>
        <button type="button" id="btnHistoryClose" class="drawer-close" aria-label="최근 매물 닫기">×</button>
      </div>
      <ul id="history" class="history">
        <li class="empty-item">비어 있음</li>
      </ul>
    </aside>
    <button type="button" id="drawerBackdrop" class="drawer-backdrop" hidden aria-label="최근 매물 닫기"></button>

    <div id="lightbox" class="lightbox" hidden aria-hidden="true">
      <button type="button" class="lightbox-close" id="lightboxClose" aria-label="닫기">×</button>
      <button type="button" class="lightbox-nav lightbox-nav--prev" id="lightboxPrev" aria-label="이전 사진">‹</button>
      <div class="lightbox-content">
        <div class="lightbox-meta">
          <span id="lightboxBadge" class="image-analysis-badge image-analysis-badge--inline lightbox-badge" hidden></span>
          <span id="lightboxCount" class="lightbox-count" hidden></span>
        </div>
        <div class="lightbox-image-wrap">
          <img id="lightboxImg" alt="" />
        </div>
        <p id="lightboxCaption" class="lightbox-caption" hidden></p>
      </div>
      <div id="lightboxProgress" class="lightbox-progress" hidden>
        <i></i>
      </div>
      <button type="button" class="lightbox-nav lightbox-nav--next" id="lightboxNext" aria-label="다음 사진">›</button>
    </div>
    </div>

    <script src="ai/config.js?v=20260521-1618"></script>
    <script src="ai/client.js?v=20260521-1727"></script>
    <script src="ai/gate.js?v=20260521-1618"></script>
    <script src="app.js?v=20260521-1848-strict-promo-image"></script>
  </body>
</html>
